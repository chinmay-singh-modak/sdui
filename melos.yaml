name: flutter_sdui_workspace

packages:
  - flutter_sdui_annotations
  - flutter_sdui_converter
  - flutter_sdui_test

command:
  bootstrap:
    usePubspecOverrides: true

scripts:
  analyze:
    run: dart analyze --fatal-infos
    exec:
      concurrency: 3
    description: Run static analysis across all packages

  format:
    run: dart format --set-exit-if-changed .
    exec:
      concurrency: 3
    description: Check formatting across all packages

  test:
    run: dart test
    packageFilters:
      dirExists: test
    exec:
      concurrency: 1
    description: Run tests across all packages

  test:flutter:
    run: flutter test
    packageFilters:
      dependsOn: flutter
    description: Run Flutter tests (flutter_sdui_test)

  publish:dry:
    run: dart pub publish --dry-run
    exec:
      concurrency: 1
    description: Dry-run publish for all packages
