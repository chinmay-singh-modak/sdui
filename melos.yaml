name: flutter_sdui_workspace

packages:
  - packages/*

ide:
  intellij: true

command:
  bootstrap:
    usePubspecOverrides: true

scripts:
  analyze:
    run: dart analyze --fatal-infos
    exec:
      concurrency: 3
    description: Run static analysis across all packages

  format:
    run: dart format --set-exit-if-changed .
    exec:
      concurrency: 3
    description: Check formatting across all packages

  test:dart:
    run: dart test
    exec:
      concurrency: 1
    packageFilters:
      dirExists: test
      ignore:
        - flutter_sdui_kit
        - flutter_sdui_test
    description: Run tests for pure-Dart packages (annotations, converter)

  test:flutter:
    run: flutter test
    exec:
      concurrency: 1
    packageFilters:
      dirExists: test
      dependsOn: flutter
    description: Run Flutter tests (flutter_sdui_kit, flutter_sdui_test)

  build:runner:
    run: dart run build_runner build --delete-conflicting-outputs
    packageFilters:
      dependsOn: build_runner
    description: Run build_runner for packages that need code generation

  clean:
    run: melos exec -- "flutter clean" || true
    packageFilters:
      dependsOn: flutter
    description: Clean Flutter packages

  publish:dry:
    run: dart pub publish --dry-run
    exec:
      concurrency: 1
    description: Dry-run publish check for all packages

  publish:
    run: dart pub publish
    exec:
      concurrency: 1
    description: Publish all packages to pub.dev
