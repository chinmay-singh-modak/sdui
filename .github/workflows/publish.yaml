name: Publish

# Triggered automatically by release-please when it creates a tag after a
# Release PR is merged. Tags follow the pattern: <package_name>-v<semver>
#
# pub.dev OIDC automated publishing must be configured once per package at:
# https://pub.dev/packages/<package>/admin → Automated publishing → GitHub Actions
# Repository: chinmay-singh-modak/sdui
# Workflow: publish.yaml  Tag pattern: <package_name>-v{{version}}

on:
  push:
    tags:
      - 'flutter_sdui_annotations-v[0-9]*'
      - 'flutter_sdui_converter-v[0-9]*'
      - 'flutter_sdui_kit-v[0-9]*'
      - 'flutter_sdui_test-v[0-9]*'

  # Manual override: useful for republishing or testing publish flow
  workflow_dispatch:
    inputs:
      package:
        description: Package to publish
        required: true
        type: choice
        options:
          - flutter_sdui_annotations
          - flutter_sdui_converter
          - flutter_sdui_kit
          - flutter_sdui_test
      dry_run:
        description: Dry run only (no actual publish)
        type: boolean
        default: true

jobs:
  # Resolves which package and tag to operate on — used by all downstream jobs
  resolve:
    runs-on: ubuntu-latest
    outputs:
      package: ${{ steps.pkg.outputs.name }}
      tag: ${{ steps.pkg.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve package name and tag
        id: pkg
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            PKG="${{ inputs.package }}"
            VERSION=$(grep '^version:' "packages/${PKG}/pubspec.yaml" | awk '{print $2}')
          else
            PKG=$(echo "${{ github.ref_name }}" | sed 's/-v[0-9].*$//')
            VERSION=$(echo "${{ github.ref_name }}" | sed 's/.*-v//')
          fi
          echo "name=${PKG}" >> "$GITHUB_OUTPUT"
          echo "tag=${PKG}-v${VERSION}" >> "$GITHUB_OUTPUT"

  # Dry-run only — runs when workflow_dispatch with dry_run: true
  dry-run:
    needs: resolve
    if: github.event_name == 'workflow_dispatch' && inputs.dry_run == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap
        run: melos bootstrap

      - name: Dry-run publish
        working-directory: packages/${{ needs.resolve.outputs.package }}
        run: dart pub publish --dry-run

  # Actual publish — uses dart-lang reusable workflow for OIDC
  publish:
    needs: resolve
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.dry_run == false)
    permissions:
      id-token: write # Required for pub.dev OIDC automated publishing
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
    with:
      working-directory: packages/${{ needs.resolve.outputs.package }}

  # Promotes the draft GitHub Release only after a successful publish
  promote-release:
    needs: [resolve, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to promote draft GitHub Release
    steps:
      - name: Promote GitHub Release from draft
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "${{ needs.resolve.outputs.tag }}" --draft=false --repo "${{ github.repository }}"
